name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore CoreFutsal/CoreFutsal.csproj

      - name: Build
        run: dotnet build CoreFutsal/CoreFutsal.csproj --no-restore --configuration Release

      - name: Restore tests
        run: dotnet restore tests/CoreFutsal.Tests/CoreFutsal.Tests.csproj

      - name: Test
        run: dotnet test tests/CoreFutsal.Tests/CoreFutsal.Tests.csproj --no-restore --verbosity normal
        env:
          Jwt__Key: "ci-test-jwt-key-that-is-at-least-32-characters-long"
